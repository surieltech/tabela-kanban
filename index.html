<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="src/style.css">
</head>

<body>

    <div class="container">

        <header class="kanban-header">
            <h1>📋 Meu Kanban</h1>
            <p>Gerencie suas tarefas de forma visual</p>
        </header>

        <main class="kanban">

            <!-- Coluna 1: To Do -->
            <div class="kanban-column" data-column="todo">
                <div class="kanban-title">
                    <h2>To Do</h2>
                </div>
                
                <div class="add-card">
                    <button class="btn-add">
                        <i class="fa-solid fa-plus"></i> Add Task
                    </button>   
                </div>

                <div class="kanban-cards">
                    <!-- Cards serão inseridos aqui -->
                </div>
            </div>

            <!-- Coluna 2: In Progress -->
            <div class="kanban-column" data-column="progress">
                <div class="kanban-title">
                    <h2>In Progress</h2>
                </div>
                
                <div class="add-card">
                    <button class="btn-add">
                        <i class="fa-solid fa-plus"></i> Add Task
                    </button>   
                </div>

                <div class="kanban-cards">
                    <!-- Cards serão inseridos aqui -->
                </div>
            </div>

            <!-- Coluna 3: Testing -->
            <div class="kanban-column" data-column="testing">
                <div class="kanban-title">
                    <h2>Testing</h2>
                </div>
                
                <div class="add-card">
                    <button class="btn-add">
                        <i class="fa-solid fa-plus"></i> Add Task
                    </button>   
                </div>

                <div class="kanban-cards">
                    <div class="kanban-cards">
                        <!-- Exemplo de card vazio - sem tarefas -->
                    </div>
                </div>
            </div>

            <!-- Coluna 4: Fixing -->
            <div class="kanban-column" data-column="fixing">
                <div class="kanban-title">
                    <h2>Fixing</h2>
                </div>
                
                <div class="add-card">
                    <button class="btn-add">
                        <i class="fa-solid fa-plus"></i> Add Task
                    </button>   
                </div>

                <div class="kanban-cards">
                    <!-- Cards serão inseridos aqui -->
                </div>
            </div>

            <!-- Coluna 5: Approved/Done -->
            <div class="kanban-column" data-column="done">
                <div class="kanban-title">
                    <h2>Approved/Done</h2>
                </div>
                
                <div class="add-card">
                    <button class="btn-add">
                        <i class="fa-solid fa-plus"></i> Add Task
                    </button>   
                </div>

                <div class="kanban-cards">
                   <!-- Cards serão inseridos aqui -->
                </div>
            </div>
            
        </main>
    </div>

    <script src="src/script.js"></script>

</body>

</html>
